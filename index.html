<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #1e1e1e;
            color: #dcdcdc;
            padding: 15px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            margin-top: 0;
        }

        select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            margin-top: 10px;
            background-color: #2c2c2c;
            color: #dcdcdc;
            border: 1px solid #444;
        }

        button {
            margin-top: 10px;
            padding: 6px;
            width: 100%;
            background: #3a3a3a;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            background-color: #000;
            color: #fff;
            overflow: auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        .hidden {
            display: none;
        }

        .dashboard-link {
            display: block;
            margin: 6px 0;
            color: #4da3ff;
            cursor: pointer;
            text-decoration: underline;
        }

        .dashboard-link:hover {
            color: #82c7ff;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="sidebar">
        <h2>Dashboard Portal</h2>

        <select id="dashboardSelect">
            <option value="HOME">Home</option>
        </select>

        <button onclick="openInNewTab()">Open in New Tab</button>
    </div>

    <div class="main-content">
        <!-- HOME VIEW -->
        <div id="homeView">
            <h2>Instructions</h2>
            <ul>
                <li>Select a dashboard from the dropdown menu.</li>
                <li>The dashboard will load in the panel.</li>
                <li>Use "Open in New Tab" for full-screen view.</li>
            </ul>

            <h3>Available Dashboards</h3>
            <div id="dashboardList"></div>
        </div>

        <!-- IFRAME VIEW -->
        <iframe id="dashboardFrame" class="hidden"></iframe>
    </div>
</div>

<script>
    const dashboards = [
        {
            name: "Worker Condition Analysis",
            url: "http://192.168.251.43:8501/"
        },
        {
            name: "Shipment Condition",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/ptIZpqsNz/shipment-condition?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "One Way Shipment",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/OVlHCrCNk/one-way-shipment?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "EAB Backlog",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/AF6U__CNz/eab-backlog?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "Temperature Dashboard",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/Nh0w3JqHk/temperature-dashboard?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "EAB Work In Progress",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/cj-3cZPHk/eab-work-in-progress?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "SEB Work In Progress",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/41qVUGyHk/seb-work-in-progress?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "CA Work In Progress",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/noB9-DsHz/ca-work-in-progress?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "SMT Process Time",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/sV-83s6Hk/smt-process-time?orgId=1&refresh=5s&kiosk"
        },
        {
            name: "Production Output",
            url: "https://braylen-chondromatous-nonhereditably.ngrok-free.dev/d/8DHIDBgvz/production-output?orgId=1&refresh=30s&kiosk"
        }
    ];

    const select = document.getElementById('dashboardSelect');
    const iframe = document.getElementById('dashboardFrame');
    const homeView = document.getElementById('homeView');
    const dashboardList = document.getElementById('dashboardList');

    function populateDropdown() {
        dashboards.forEach(db => {
            const option = document.createElement('option');
            option.value = db.url;
            option.textContent = db.name;
            select.appendChild(option);
        });
    }

    function renderHomeList() {
        dashboardList.innerHTML = "";

        dashboards.forEach(db => {
            const div = document.createElement('div');
            div.className = "dashboard-link";
            div.textContent = db.name;

            div.onclick = () => {
                select.value = db.url;
                showDashboard(db.url);
            };

            dashboardList.appendChild(div);
        });
    }

    function showDashboard(url) {
        if (!url || url === "HOME") {
            iframe.classList.add("hidden");
            homeView.classList.remove("hidden");
            return;
        }

        homeView.classList.add("hidden");
        iframe.classList.remove("hidden");

        iframe.src = url;
        localStorage.setItem("selectedDashboard", url);
    }

    function openInNewTab() {
        const url = select.value;
        if (url && url !== "HOME") {
            window.open(url, "_blank");
        }
    }

    select.addEventListener('change', () => {
        showDashboard(select.value);
    });

    window.onload = () => {
        populateDropdown();
        renderHomeList();

        const saved = localStorage.getItem("selectedDashboard");

        if (saved) {
            select.value = saved;
            showDashboard(saved);
        } else {
            select.value = "HOME";
            showDashboard("HOME");
        }
    };
</script>

</body>
</html>
